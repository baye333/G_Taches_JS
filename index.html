<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Application de Gestion des Tâches</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestion des Tâches</h1>

    <!-- Formulaire d'ajout -->
    <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Ajouter une tâche..." required>
        <button type="submit">Ajouter</button>
    </form>

    <!-- Liste des tâches -->
    <ul id="taskList"></ul>

    <script src="app.js"></script>
</body>
</html>
